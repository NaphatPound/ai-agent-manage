services:
  # ── Local Ollama runtime (chat + embeddings) ───────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ai-agent-ollama
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── One-shot: pull the embedding model so RAG works on first run ──
  ollama-init:
    image: ollama/ollama:latest
    container_name: ai-agent-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Pulling embedding model..."
        OLLAMA_HOST=http://ollama:11434 ollama pull ${EMBEDDING_MODEL:-nomic-embed-text}
        echo "Pulling default chat model (override CHAT_MODEL to skip large downloads)..."
        OLLAMA_HOST=http://ollama:11434 ollama pull ${CHAT_MODEL:-llama3.2:1b} || echo "Chat model pull failed — continuing"
        echo "Model pulls complete."
    restart: "no"

  # ── Postgres with pgvector for the RAG store ───────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-agent-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_assistant
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./ai-assistant/init-db.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── RAG + chat + MCP orchestrator ──────────────────────────────
  ai-assistant:
    build:
      context: ./ai-assistant
      dockerfile: Dockerfile
    image: ai-assistant:latest
    container_name: ai-assistant
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/ai_assistant"
      OLLAMA_API_URL: "${OLLAMA_API_URL:-http://ollama:11434}"
      OLLAMA_MODEL: "${CHAT_MODEL:-llama3.2:1b}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── Main gateway: trello-clone UI + Claude runner + proxies ───
  ai-agent-board:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-agent-board:latest
    container_name: ai-agent-board
    ports:
      - "3456:3456"
    environment:
      PORT: "3456"
      ASSISTANT_URL: "http://ai-assistant:3000"
      OLLAMA_URL: "${OLLAMA_URL:-https://ollama.com}"
      OLLAMA_AUTH_TOKEN: "${OLLAMA_AUTH_TOKEN:-}"
      # Point the `ollama` CLI at the in-compose ollama daemon so
      # `ollama launch claude --model <id>` can connect without a local server.
      OLLAMA_HOST: "http://ollama:11434"
      # Optional — protect the runner API with a bearer token
      # API_KEY: "change-me"
      # Optional — enables AI stall detection for long-running Claude Code tasks
      # ANTHROPIC_API_KEY: "sk-ant-..."
      # STALL_DETECTION: "true"
    depends_on:
      ai-assistant:
        condition: service_started
      ollama:
        condition: service_healthy
    volumes:
      - workspace:/workspace
      # Persist the runner user's entire HOME — needed for claude CLI auth
      # because credentials live in BOTH ~/.claude/ (dir) AND ~/.claude.json (file).
      # Mounting the whole home keeps both across container recreates.
      - runner-home:/home/runner
      # Mount host projects dir at the SAME path so users can type
      # native host paths (e.g. /Users/administrator/Documents/project/foo)
      # in Settings → Working Directory and they resolve 1:1 inside the container.
      - /Users/administrator/Documents/project:/Users/administrator/Documents/project
    restart: unless-stopped

volumes:
  workspace:
  dbdata:
  ollama:
  runner-home:
